name: publish

on:
  push:
    tags:
      - "v*"
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  build:
    name: build sdist + wheel (reproducible)
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install --upgrade pip build
      - id: meta
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
      - name: Pin SOURCE_DATE_EPOCH to tagged commit
        run: |
          echo "SOURCE_DATE_EPOCH=$(git log -1 --pretty=%ct)" >> "$GITHUB_ENV"
      - run: python -m build
      - run: ls -lh dist/
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  sigstore:
    name: sigstore signing (cosign-style bundle)
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write           # required for keyless OIDC signing
      contents: read
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Sign sdist + wheel with sigstore
        uses: sigstore/gh-action-sigstore-python@v3.0.0
        with:
          inputs: |
            ./dist/*.tar.gz
            ./dist/*.whl
      - uses: actions/upload-artifact@v4
        with:
          name: sigstore-bundles
          path: |
            dist/*.sigstore
            dist/*.sigstore.json

  audit:
    name: pip-audit (release artefacts)
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install --upgrade pip pip-audit
      - run: pip install -e ".[dev,server,fhe]"
      - run: pip-audit --strict --vulnerability-service osv

  sbom:
    name: sbom + checksum
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - run: python -m pip install --upgrade pip cyclonedx-bom
      - run: pip install -e ".[server,fhe]"
      - run: cyclonedx-py environment --output-format JSON --output-file sbom.cdx.json
      - run: cd dist && sha256sum *.tar.gz *.whl > SHA256SUMS
      - uses: actions/upload-artifact@v4
        with:
          name: release-attestations
          path: |
            sbom.cdx.json
            dist/SHA256SUMS

  publish:
    name: publish to PyPI (OIDC trusted publisher)
    needs: [build, audit, sbom, sigstore]
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/regaudit-fhe
    permissions:
      id-token: write           # OIDC publish to PyPI
      contents: write           # attach release attestations
      attestations: write       # build provenance
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - uses: actions/download-artifact@v4
        with:
          name: release-attestations
          path: attest/
      - uses: actions/download-artifact@v4
        with:
          name: sigstore-bundles
          path: sigstore/
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          attestations: true
      - name: Upload SBOM + checksums + sigstore bundles to the GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            attest/sbom.cdx.json
            attest/dist/SHA256SUMS
            sigstore/*
            dist/*
          generate_release_notes: true
