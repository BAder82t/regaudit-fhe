version: 2

updates:
  # Python dependencies declared in pyproject.toml.
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "07:00"
      timezone: "Etc/UTC"
    open-pull-requests-limit: 5
    labels: ["dependencies", "python"]
    commit-message:
      prefix: "deps"
      include: "scope"
    groups:
      runtime-deps:
        patterns:
          - "numpy"
          - "cryptography"
          - "jsonschema"
          - "tenseal"
      server-deps:
        patterns:
          - "fastapi"
          - "uvicorn*"
          - "pydantic*"
      dev-deps:
        patterns:
          - "pytest*"
          - "ruff"
          - "mypy"
          - "hypothesis"
          - "psutil"
          - "httpx"

  # GitHub Actions versions.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "07:00"
      timezone: "Etc/UTC"
    open-pull-requests-limit: 5
    labels: ["dependencies", "ci"]
    commit-message:
      prefix: "ci"
      include: "scope"

  # Dockerfile base-image updates.
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "07:00"
      timezone: "Etc/UTC"
    open-pull-requests-limit: 3
    labels: ["dependencies", "docker"]
    commit-message:
      prefix: "docker"
      include: "scope"
